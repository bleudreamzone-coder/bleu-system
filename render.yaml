services:
  - type: web
    name: bleu-system
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start

  - type: cron
    name: bleu-reorder-reminders
    runtime: node
    schedule: "0 14 * * *"
    buildCommand: ""
    startCommand: "curl -X POST --max-time 60 -fsS https://bleu-system.onrender.com/api/send-reorder-reminders"
