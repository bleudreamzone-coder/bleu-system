name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  offline-tests:
    name: Offline test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax check server.js
        run: node --check server.js

      - name: Run schema and offline shape tests
        run: npm run test:schemas

      - name: Run prompt compliance test
        run: npm run test:prompt

      - name: Run server logic smoke test
        run: npm run test:logic

      - name: Run Trust Packet v0 diagnostic
        run: npm run test:trust-packet-v0

      - name: Run local Stripe webhook smoke test
        run: npm run test:webhook-smoke

      # Excluded from CI: npm run test:browser.
      # Reason: the Playwright specs drive live commerce/browser flows that can
      # navigate to external services such as Stripe Checkout and Amazon, so they
      # are not part of the no-secrets, offline pull-request safety gate.
