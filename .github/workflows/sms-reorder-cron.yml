# SMS reorder reminders — daily cron trigger for /api/send-reorder-reminders
#
# Per _meta/audit/2026-05-21/11_NEXT_30_DAYS.md W1.10 / TD-023.
# The endpoint at server.js (~line 2429) is wired to Supabase + Twilio and
# fully functional; this workflow is the scheduler that was missing.
#
# Schedule: 13:00 UTC daily = 9am ET (EDT) / 8am ET (EST). Picked per the
# audit's 30-day plan to land during US-East waking hours. Adjust if your
# user base skews to a different timezone.
#
# REQUIRED MANUAL STEPS BEFORE THIS WORKFLOW DOES ANYTHING USEFUL:
#   1. Generate a strong random secret:
#        openssl rand -hex 32
#   2. Add it to GitHub Actions Secrets (Repo Settings → Secrets and
#      variables → Actions → New repository secret):
#        Name:  REORDER_CRON_SECRET
#        Value: <hex from step 1>
#   3. Add the SAME value to Render production env (Render Dashboard →
#      bleu-system service → Environment → Add Environment Variable):
#        Key:   REORDER_CRON_SECRET
#        Value: <hex from step 1>
#   4. Save + redeploy on Render.
#   5. Smoke-test by running:
#        gh workflow run sms-reorder-cron.yml
#      then check the run logs and the Twilio send report.
#
# If REORDER_CRON_SECRET is missing on either side, the endpoint returns
# HTTP 500 (server.js fail-closed) or this workflow's curl returns HTTP 401.

name: SMS Reorder Reminders

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC daily (9am EDT / 8am EST)
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST to /api/send-reorder-reminders
        env:
          REORDER_CRON_SECRET: ${{ secrets.REORDER_CRON_SECRET }}
        run: |
          if [ -z "$REORDER_CRON_SECRET" ]; then
            echo "::error::REORDER_CRON_SECRET is not set in repo Actions Secrets"
            exit 1
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $REORDER_CRON_SECRET" \
            -H "Content-Type: application/json" \
            https://bleu.live/api/send-reorder-reminders)
          echo "HTTP $response"
          cat /tmp/body
          echo
          # 200 is success; treat anything else as failure so the workflow
          # surfaces in the Actions tab and the user gets notified.
          if [ "$response" != "200" ]; then
            echo "::error::Reorder reminders endpoint returned HTTP $response"
            exit 1
          fi
